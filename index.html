    <script>
      // Redefine window.fetch to be configurable and writable (with getter/setter) 
      // to prevent "TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // when external environment/sandbox/iframe instruments attempt to assign it.
      try {
        const originalFetch = window.fetch;
        let customFetch = originalFetch;
        Object.defineProperty(window, 'fetch', {
          get() {
            return customFetch;
          },
          set(val) {
            customFetch = val;
          },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.warn("Could not make window.fetch configurable:", e);
      }

      // Suppress cross-origin iframe/external script errors (e.g. from Google Drive iframe previewer)
      // that trigger "Script error." in the parent environment's logs, as well as window.fetch property assignment errors.
      window.onerror = function(message) {
        const msgStr = String(message || "");
        if (msgStr === 'Script error.' || msgStr.includes('Script error') || msgStr.includes('property fetch') || msgStr.includes('property \'fetch\'')) {
          return true; // Prevent default error handler from firing
        }
      };
      window.addEventListener('error', function(e) {
        const msgStr = String(e.message || "");
        if (msgStr === 'Script error.' || msgStr.includes('Script error') || msgStr.includes('property fetch') || msgStr.includes('property \'fetch\'')) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      }, true);
    </script>
